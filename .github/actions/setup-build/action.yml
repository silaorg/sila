name: Setup Node and build desktop app
description: Sets up Node, installs deps, and builds the desktop app
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: |
        # aiwrapper runs `npx airul gen` in preinstall. Running lifecycle scripts
        # in the foreground avoids concurrent npx cache races on Windows.
        npm ci --foreground-scripts

    - name: Build desktop application
      shell: bash
      run: |
        cd packages/desktop
        npm run build

